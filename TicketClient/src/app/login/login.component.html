<body class="d-flex" style="width: 100%;">
    <div class="col"></div>
    <form #loginForm="ngForm" (ngSubmit)="login()" autocomplete="off" class="col-2 text-center my-5 card" style="min-width:300px;">
        <h1 class="card-header">Login</h1>
        <div class="card-body">
            <div class="form-floating">
                <input name="username" [(ngModel)]="model.username" class="mt-2 form-control" id="floatingInput" type="email" placeholder="Username">
                <label for="floatingInput">Username</label>
            </div>
            <div class="form-floating">
                <input name="password" [(ngModel)]="model.password" 
                    class="mt-3 form-control" id="floatingPassword" 
                    type="password" placeholder="Password">
                <label for="floatingPassword">Password</label>
            </div>
            <div class="my-4">
                <button type="submit" class="btn btn-primary" style="min-width:150px;">Login</button>
            </div>
        </div>
    </form>
    <div class="col"></div>
</body>
